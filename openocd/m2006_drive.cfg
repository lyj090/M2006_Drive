# M2006_Drive — OpenOCD 工程入口（STM32F427IIHx，SWD + ST-Link）
#
# 原理简述：
# - OpenOCD 把「调试适配器」和「目标 MCU」分成两层脚本：interface 负责 USB/SWD，
#   target 负责识别 Cortex-M 内核、SRAM 工作区、内部 Flash 擦写算法等。
# - [find ...] 在 -s 指定的脚本搜索路径里查找文件；本工程使用两个 -s：
#   1) 本目录 openocd/（可放团队自定义覆盖）
#   2) 系统脚本目录（如 /usr/share/openocd/scripts，随发行版/OpenOCD 安装）
#
# 在仓库根目录执行示例：
#   openocd -s $PWD/openocd -s /usr/share/openocd/scripts -f openocd/m2006_drive.cfg
#
# 若你的调试器是 ST-Link V2-1（常见于 Nucleo/板载），把下一行改为：
#   source [find interface/stlink-v2-1.cfg]

source [find interface/stlink-v2.cfg]

transport select hla_swd

# SWD 时钟（kHz）。OpenOCD 0.10 仅支持 adapter_khz；0.11+ 才支持 adapter speed。
# 烧录擦除阶段勿用过高频率：日志里升到 4000 kHz 时易出现
#   "failed erasing sectors" / "invalid mode value - communication failure"
# 线长或接触不稳时改为 500。
adapter_khz 1000

# 烧录前复位：若板子 NRST 未接 SWD，connect_assert_srst 会导致通信失败，改用 none
reset_config none separate

source [find target/stm32f4x.cfg]

# 与 stm32f4x 默认一致；F407 1MB 由 OpenOCD 按 device id 自动识别
set WORKAREASIZE 0x20000

# 覆盖 stm32f4x.cfg reset-init：默认会把 adapter_khz 提到 8000，ST-Link V2 擦写易失败
stm32f4x.cpu configure -event reset-init {
	adapter_khz 480
}
